# navlinks is included by navbar and gives the list of links common to all pages.
#
# This data source auto-discovers eligible targets in the vhost root.
#
# It can be replaced by a manually-authored definition like:
#
#   navlinks:
#     /urlone: First
#     /urltwo: Second
#
$navlinks:
  script: javascript
  code: |
    var docroot = env.DOCUMENT_ROOT || '.';
    var results = [{key: "/", value: "Home"}];
    var files = listdir(docroot);
    files.sort();
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      var parts = splitExt(f);
      var name = parts[0], ext = parts[1];
      if (name.charAt(0) === '.' || name.charAt(0) === '_' || name === 'index') continue;
      var title = name.replace(/[-_]/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
      if (ext === '.md') {
        results.push({key: "/" + name, value: title});
      } else if (ext === '.yaml') {
        try {
          var head = readFileHead(joinPath(docroot, f), 500);
          if (/^main:/m.test(head)) {
            results.push({key: "/" + name, value: title});
          }
        } catch (e) {}
      }
    }
    print(JSON.stringify(results));
