navbar:
  bootstrap5:
  navbar-cf:
    navbar-toggler:
        - navbar-toggler-icon
        - brand
    navbar-collapse:
      - navbar-nav:
          - navlinks
      - navform
      - navbar-nav-right:
          - navlinksright
^navbar:
  tag: nav
  params:
    class: navbar navbar-expand-lg navbar-dark bg-dark
^navbar-cf:
  tag: div
  params:
    class: container-fluid
^navbar-toggler:
  tag: button
  params:
    class: navbar-toggler
    type: button
    data-bs-toggle: collapse
    data-bs-target: "#navbarNav"
    aria-controls: navbarNav
    aria-expanded: "false"
    aria-label: Toggle navigation
^navbar-toggler-icon:
  tag: span
  params:
    class: navbar-toggler-icon
^navbar-collapse:
  tag: div
  params:
    class: collapse navbar-collapse
    id: navbarNav
^navbar-nav:
  tag: ul
  params:
    class: navbar-nav
^navform:
  tag: form
  params:
    class: d-flex ms-auto me-2
^navbar-nav-right:
  tag: ul
  params:
    class: navbar-nav
^navlinks:
  script: javascript
  code: |
    var page = env.REQUEST_URI || '/';
    var key = record.key || '';
    var value = record.value;
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    var isObj = value && typeof value === 'object' && !Array.isArray(value);
    if (isObj && '_html' in value) {
      var active = (key === page) ? ' active bg-primary bg-opacity-10' : '';
      print('<li class="nav-item"><a class="nav-link' + active + '" href="' + esc(key) + '">' + value._html + '</a></li>');
    } else if (isObj) {
      print('<li class="nav-item dropdown">');
      print('  <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">' + esc(key) + '</a>');
      print('  <ul class="dropdown-menu dropdown-menu-end">');
      for (var link in value) {
        if (!Object.prototype.hasOwnProperty.call(value, link)) continue;
        var t = value[link];
        var textHtml = (t && typeof t === 'object' && '_html' in t) ? t._html : esc(t);
        print('    <li><a class="dropdown-item" href="' + esc(link) + '">' + textHtml + '</a></li>');
      }
      print('  </ul>');
      print('</li>');
    } else {
      var active2 = (key === page) ? ' active bg-primary bg-opacity-10' : '';
      print('<li class="nav-item"><a class="nav-link' + active2 + '" href="' + esc(key) + '">' + esc(value) + '</a></li>');
    }
