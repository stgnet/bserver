navbar:
  bootstrap5:
  navbar-cf:
    navbar-toggler:
        - navbar-toggler-icon
        - brand
    navbar-collapse:
      navbar-nav:
        - navlinks
      navbar-nav-right:
        - navlinksright
^navbar:
  tag: nav
  params:
    class: navbar navbar-expand-lg navbar-dark bg-primary rounded-bottom mb-3
^navbar-cf:
  tag: div
  params:
    class: container-fluid
^navbar-toggler:
  tag: button
  params:
    class: navbar-toggler
    type: button
    data-bs-toggle: collapse
    data-bs-target: "#navbarNav"
    aria-controls: navbarNav
    aria-expanded: "false"
    aria-label: Toggle navigation
^navbar-toggler-icon:
  tag: span
  params:
    class: navbar-toggler-icon
^navbar-collapse:
  tag: div
  params:
    class: collapse navbar-collapse
    id: navbarNav
^navbar-nav:
  tag: ul
  params:
    class: navbar-nav
^navbar-nav-right:
  tag: ul
  params:
    class: navbar-nav ms-auto
^navlinks:
  script: python
  code: |
    import os, html as _html
    page = os.environ.get('REQUEST_URI', '/')
    key = record.get('key', '')
    value = record.get('value', '')
    if isinstance(value, list):
        # List value: first element is text label, rest are pre-rendered HTML (icons etc.)
        text = _html.escape(str(value[0])) if value else ''
        icons = ' '.join(str(v) for v in value[1:])
        label = f'{icons} {text}'.strip() if icons else text
        active = ' active bg-primary bg-opacity-10' if key == page else ''
        print(f'<li class="nav-item"><a class="nav-link{active}" href="{_html.escape(str(key))}">{label}</a></li>')
    elif isinstance(value, dict):
        # Bootstrap 5 dropdown menu
        title = _html.escape(str(key))
        print(f'<li class="nav-item dropdown">')
        print(f'  <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">{title}</a>')
        print(f'  <ul class="dropdown-menu dropdown-menu-end">')
        for link, text in value.items():
            print(f'    <li><a class="dropdown-item" href="{_html.escape(str(link))}">{_html.escape(str(text))}</a></li>')
        print(f'  </ul>')
        print(f'</li>')
    else:
        # Simple nav link
        active = ' active bg-primary bg-opacity-10' if key == page else ''
        print(f'<li class="nav-item"><a class="nav-link{active}" href="{_html.escape(str(key))}">{_html.escape(str(value))}</a></li>')
^navlinksright:
  script: php
  code: |
    $page = getenv('REQUEST_URI') ?: '/';
    $key = $record['key'] ?? '';
    $value = $record['value'] ?? '';
    if (is_array($value) && isset($value[0])) {
        // List value: first element is text label, rest are pre-rendered HTML (icons etc.)
        $text = htmlspecialchars(strval($value[0]));
        $icons = implode(' ', array_slice($value, 1));
        $label = $icons ? "$icons $text" : $text;
        $active = ($key === $page) ? ' active bg-primary bg-opacity-10' : '';
        $key = htmlspecialchars(strval($key));
        echo "<li class=\"nav-item\"><a class=\"nav-link$active\" href=\"$key\">$label</a></li>\n";
    } elseif (is_array($value)) {
        $title = htmlspecialchars($key);
        echo "<li class=\"nav-item dropdown\">\n";
        echo "  <a class=\"nav-link dropdown-toggle\" href=\"#\" role=\"button\" data-bs-toggle=\"dropdown\" aria-expanded=\"false\">$title</a>\n";
        echo "  <ul class=\"dropdown-menu dropdown-menu-end\">\n";
        foreach ($value as $link => $text) {
            $link = htmlspecialchars($link);
            $text = htmlspecialchars($text);
            echo "    <li><a class=\"dropdown-item\" href=\"$link\">$text</a></li>\n";
        }
        echo "  </ul>\n";
        echo "</li>\n";
    } else {
        $active = ($key === $page) ? ' active bg-primary bg-opacity-10' : '';
        $key = htmlspecialchars($key);
        $value = htmlspecialchars($value);
        echo "<li class=\"nav-item\"><a class=\"nav-link$active\" href=\"$key\">$value</a></li>\n";
    }
