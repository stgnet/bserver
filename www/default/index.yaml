main:
  - h1: "bserver Documentation"
  - p: "bserver is a YAML-driven web server that generates HTML pages from structured definitions. Write YAML, get HTML."
  - p: |
      At a high level, bserver is using YAML as a content + composition DSL for full-page generation,
      not just a template variable file. The key purpose is to let users define site pages declaratively
      with inheritance and shared structure so they can avoid repetitive HTML boilerplate. That intent is
      explicit in the pipeline/inheritance model.
  - p: "The current architecture supports that purpose in several strong ways:"
  - ulist:
      - Composable page skeletons and inheritance (html/head/body pipeline + upward name resolution).
      - Two-pass resolution/render so definitions and merges settle before output generation.
      - Name-level extension model with ^name formats and +name merges, which is effectively a component and override mechanism.
      - Unified Markdown integration by injecting converted markdown into main, then rendering the same chrome as YAML pages.
      - Script and data-source hooks that make the content model dynamic.
      - YAML-defined CSS generation for style declarations.
  - h2: "Key Features"
  - ulist:
      - YAML-driven page generation with automatic HTML rendering
      - Reusable format definitions with the ^ prefix
      - Bootstrap 5 integration out of the box
      - Markdown page support with full site chrome
      - Server-side scripting in Python, JavaScript, PHP, and Shell
      - Virtual hosting with automatic Let's Encrypt
      - Cascading name resolution across directories
  - h2: "How It Works"
  - p:
    - "Every page starts from html.yaml, which references head and body. "
    - "The body references header, main, and footer. "
    - "Your page defines main to set its content. "
    - "Names are resolved by searching for matching YAML files, starting in the current directory and walking upward."
  - h2: "Quick Example"
  - p: "A minimal page needs just an index.yaml file:"
  - pre: |-
     main:
       - h1: "Hello World"
       - p: "Welcome to my site."
  - p: "This produces a complete HTML page with doctype, head, body, navbar, and footer - all from a few lines of YAML."
  - h2: "Installation"
  - p: "Requires Go 1.24 or later. Clone the repository, build, and install as a service:"
  - pre: "git clone https://github.com/stgnet/bserver.git\ncd bserver\ngo build -o bserver\nsudo ./install-service.sh"
  - p: "This compiles bserver and installs it as a service using systemd (Linux) or launchd (macOS). The service starts automatically and is enabled on boot."
  - p: "To update and restart after pulling new changes:"
  - pre: "git pull\ngo build -o bserver\nsudo ./install-service.sh restart"
  - p: "To uninstall the service:"
  - pre: "sudo ./install-service.sh remove"
  - h2: "Documentation"
  - p: "Use the navigation above to explore, or choose a topic:"
  - links:
      /getting-started: Getting Started
      /definitions: Content Definitions
      /formats: Format Definitions
      /components: Built-in Components
      /scripts: Server-Side Scripts
      /error-handling: Error Handling
      /server-features: Server Features
      /advanced: Advanced Features
