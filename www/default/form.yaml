main:
  - card:
    - h1: GET Form Test
    - form-get-self:
      - row:
        - formcol:
          - inputlabel:
              name: search
              type: text
              class: form-control
              id: searchid
              label: Search
      - row:
        - formcol:
          - formsubmit: SEARCH
  - card:
    - h1: POST Form Test
    - form-post-self:
      - row:
        - formcol:
          - inputlabel:
             name: Phone
             type: text
             class: form-control
             id: Phone
             label: Phone Number
        - formcol:
          - inputlabel:
             name: Email
             type: email
             class: form-control
             id: Email
             label: Email address
      - row:
        - formcol:
          - formsubmit:
              SUBMIT

  - h3: 'PHP Script Output:'
  - php: |
      echo '<pre>';
      if (!empty($_POST)) {
        echo '$_POST=';
        var_dump($_POST);
      }
      else if (!empty($_GET)) {
        echo '$_GET=';
        var_dump($_GET);
      }
      else
        echo 'No GET or POST data';
      echo '</pre>';

^form-get-self:
  tag: form
  params:
    class: m-2
    method: get
    action: /form

^form-post-self:
  tag: form
  params:
    class: m-2
    method: post
    action: /form
